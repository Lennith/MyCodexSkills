interface:
  display_name: "Code Slim Refactor"
  short_description: "Run explicit convergence refactors without relaxing contracts for tests"
  default_prompt: "Use $code-slim-refactor only for an explicit structured simplification pass. Preserve the intended current backend contract, never weaken contracts or assertions just to pass tests, and run the contract-mismatch gate when tests and backend behavior disagree. Start in mode=quick unless the user asks for a formal traceable strict refactor."